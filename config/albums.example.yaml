# =============================================================================
# photogen album configuration — example
# =============================================================================
# Copy this file to albums.yaml (or albums-laptop.yaml, etc.) and edit it.
# Run: photogen -config-dir /path/to/this/dir
#
# CLI flags override YAML settings when provided:
#   -site-url   overrides settings.site_url
#   -out        overrides DDPHOTOS_ALBUMS_DIR
#   -album      filters to specific slugs (comma-separated)
#   -workers    sets concurrent resize workers
# =============================================================================

settings:
  # Site identifier — used to name the output directory: {DDPHOTOS_ALBUMS_DIR}/{id}
  # Lowercase letters, digits, and hyphens only (e.g. "prod", "my-site").
  id: my-site

  # Site title displayed in the browser tab and social sharing cards
  site_name: "Your Photo Albums"

  # Base URL used when generating sitemap.xml, OG/social sharing tags, and canonical links
  site_url: https://photos.example.com

  # Site description shown in search results and social sharing cards
  site_description: "A collection of photo albums"

  # Footer copyright line: "Copyright © {copyright_year}-{current_year}. {copyright_owner}."
  copyright_owner: "Your Name"
  copyright_year: 2000

  # Allow search engine crawling (default: false).
  # When true, robots.txt allows all bots and includes the sitemap URL.
  # allow_crawling: false

  # Optional HTML for the site title displayed on the home page.
  # Falls back to site_name when omitted. Useful for adding links or emphasis.
  # Use YAML block scalar (>-) for multi-word values with special characters.
  # site_title_html: >-
  #   <a href="https://github.com/you/repo">My Photos</a>

  # Optional HTML rendered below the site title in a smaller font.
  # site_subtitle_html: "Travel photos from around the world"

  # Optional HTML rendered above the album cards.
  # site_overview_html: "Browse our adventures below."

  # Descriptions file (relative to this config dir). Each line:
  #   slug<whitespace>description
  # Blank lines and lines starting with # are ignored.
  descriptions: descriptions.txt

  # Passwords file (relative to this config dir). When set, enables encryption
  # of JSON index files. The -passwords CLI flag overrides this at run time.
  # Do not commit real passwords — store this file outside the repo or use
  # a secrets manager. See README-DEV.md for the passwords file format.
  # passwords: passwords.yaml

  # Optional hero image displayed as a full-width banner at the top of the home page.
  # The image is hard-cropped to 1600x250px (JPEG). 'image' is joined to the named
  # 'base' path (if set) or resolved relative to this config dir (if not).
  # crop controls the vertical anchor when the source is taller than 250px:
  #   top | center | bottom (default: center)
  # The hero image is never encrypted and is used as the og:image on the home page
  # when present (preferred over the first album cover).
  # hero:
  #   image: my-banner-photo.jpg
  #   base: drive
  #   crop: center

  # Optional custom CSS file (relative to this config dir). Copied to the site
  # output as custom.css and injected site-wide via a <link> tag after the
  # built-in styles, so it can override theme variables or any other rules.
  # Redefining CSS custom properties (--bg-color, --text-color, etc.) is the
  # cleanest way to restyle without fighting specificity.
  # css: custom.css

  # Default color theme for first-time visitors (before they toggle manually).
  # Accepts "light" or "dark". Defaults to "dark" when omitted.
  # default_theme: dark

# Named source base paths. Albums reference these by name via the 'base' key.
# Defining bases here lets you swap root paths between configs (e.g., prod vs.
# laptop) without touching individual album entries.
bases:
  # Example: photos on an external drive
  drive: /Volumes/MyDrive/Photos
  # Example: photos in a cloud-synced folder
  cloud: /Users/me/Dropbox/Photos

albums:
  # ------------------------------------------------------------------
  # Full example — all fields shown
  # ------------------------------------------------------------------
  - slug: patagonia               # URL slug and output directory name (no spaces)
    name: Patagonia               # Human-readable album title
    base: drive                   # References bases.drive above
    source: 2026-Patagonia        # Joined to base path
    cover: Patagonia-042.jpg      # Optional: filename of cover photo (defaults to first)
    manual_sort_order: true       # If true, order follows photogen.txt in the source directory
    recurse: false                # If true, collect photos from subdirectories recursively (default: false)

  # ------------------------------------------------------------------
  # Minimal example — only required fields
  # ------------------------------------------------------------------
  - slug: hiking
    name: Summer Hiking
    base: drive
    source: 2025-Summer-Hiking

  # ------------------------------------------------------------------
  # Recursive — photos gathered from subdirectories
  # Subdirectory names are sanitized into a prefix to avoid filename
  # collisions (e.g. "Craig's/img001.jpg" → ID "craigs_img001").
  # Photos sort by date; subfolders sort alphabetically within each level.
  # Add a photogen.txt to any folder for captions. With manual_sort_order:
  # true, photogen.txt can list subfolder names as placeholders to control
  # inter-folder order (they expand inline when that folder is processed).
  # Subfolder photos include a "sourcePath" field in index.json (original
  # relative path) so you can find the prefixed fileName for use as cover.
  # ------------------------------------------------------------------
  - slug: ski-trip
    name: Ski Trip 2009
    base: cloud
    source: "2009 - Whistler"
    recurse: true

  # ------------------------------------------------------------------
  # No base — source is an absolute path
  # ------------------------------------------------------------------
  - slug: local-test
    name: Local Test
    source: /tmp/test-photos

  # ------------------------------------------------------------------
  # Source with spaces — quote the value
  # ------------------------------------------------------------------
  - slug: old-trip
    name: Old Trip
    base: cloud
    source: "Vacations/2005-07 Old Trip/Favorites"
    manual_sort_order: true
