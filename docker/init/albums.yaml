# ddphotos configuration
#
# See https://github.com/dougdonohoe/ddphotos/blob/main/docs/DOCKER.md for full documentation.
# See https://github.com/dougdonohoe/ddphotos/blob/main/config/albums.example.yaml for
#     specification of this file.
#
# Define bases pointing to where your source photos live. The ddphotos wrapper
# script reads these paths and mounts them automatically into Docker.
#
# NOTE: paths starting with /ddphotos are container-internal — they point to
# sample data bundled in the Docker image, not directories on your machine.
#
# Examples:
#
#   bases:
#     dropbox: /Users/anseladams/Dropbox/Vacations   # Dropbox or iCloud folder
#     t7: /T7/Photos                                 # external drive
#
# Then reference a base in each album:
#
#   albums:
#     - slug: hawaii-2024
#       title: Hawaii 2024
#       base: dropbox
#       source: hawaii-2024   # subfolder under the base path
#
# Once you have edited this file, run:
#   ./ddphotos photogen
#   ./ddphotos run
#   ./ddphotos build
#   ./ddphotos serve

settings:
  id: __SITE_ID__
  site_name: My Photos
  site_url: https://your-ddphotos.example.com
  site_description: My personal photo gallery
  copyright_owner: Your Name
  copyright_year: 2026
  allow_crawling: false
  css: custom.css
  passwords: passwords.yaml
  site_title_html: >-
    My Photos
  site_subtitle_html: >-
    A personal photo gallery.
  site_overview_html: >-
    Welcome to my <span class="accent">photo gallery</span>.
  hero:
    image: /ddphotos-hero/hero.webp
    crop: center

# Uncomment and edit bases to point to your photo directories.
# Here are two examples:
#
#bases:
#  dropbox: /Users/anseladams/Dropbox/Photos
#  t7: /T7/Photos

albums:
  - slug: temporary
    name: Replace Me
    source: /ddphotos-init
    cover: 2024-The-Way-14.jpg
    description: Edit config/albums.yaml to replace this placeholder with your own albums (also update the site settings). Then run 'ddphotos photogen' and 'ddphotos run' again.

  - slug: secret
    name: Secret
    source: /ddphotos-secret
    description: This album has a password.

  - slug: empty
    name: Empty
    source: /ddphotos-empty
    description: This album doesn't have any photos in it.
