server {
    listen 80;
    root /usr/share/nginx/html;

    error_page 404 /404.html;

    # JSON data files must revalidate on every request (content can change in-place).
    # WebP photos are content-addressed (UUID filenames), so they are immutable.
    location ~* \.json$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location ~* \.webp$ {
        add_header Cache-Control "max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Remove trailing slash (301), except root.
    # Use $http_host (not $host) so the port is preserved in the Location header.
    location ~ ^(.+)/$ {
        return 301 $scheme://$http_host$1;
    }

    # Photo permalink: /albums/slug/N -> serve /albums/slug.html
    location ~ ^/albums/([^/]+)/\d+$ {
        try_files /albums/$1.html =404;
    }

    # Root: serve index.html directly (try_files $uri for / sees a directory and falls through)
    location = / {
        try_files /index.html =404;
    }

    # Serve exact file, or try .html extension; fall back to 404
    location / {
        try_files $uri $uri.html @spa_fallback;
    }

    location @spa_fallback {
        return 404;
    }
}
