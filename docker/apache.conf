<VirtualHost *:80>
    DocumentRoot /htdocs

    <Directory /htdocs>
        Options +FollowSymLinks -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Allow access to symlink targets in the mounted volume
    <Directory /ddphotos>
        Options +FollowSymLinks -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access_log combined
</VirtualHost>
