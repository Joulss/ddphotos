name: Docker Release

# Triggered when a version tag (e.g. v1.2.3) is pushed.
# Builds a multi-arch Docker image and pushes it to Docker Hub as
# both :vX.Y.Z and :latest.  See bin/docker-push.sh for build details.
#
# Required GitHub Actions secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token with Read & Write access
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history needed so git tag --points-at HEAD works in docker-push.sh
          fetch-depth: 0

      - name: Set up QEMU
        # Enables cross-compilation for non-native architectures (arm64 on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        # Required for multi-platform builds (linux/amd64 + linux/arm64)
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        # --doit skips the interactive confirmation prompt
        run: bin/docker-push.sh --doit
